<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obsidian Local MCP · 설정</title>
  <style>
    :root {
      --bg: #1e1e23; --panel: #26262e; --text: #e6e6ea; --muted: #9a9aa6;
      --accent: #7c6cff; --accent-hover: #8d7eff; --border: #34343e; --ok: #3ecf8e; --err: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 32px;
    }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 28px 30px; width: 100%; max-width: 560px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    h1 { font-size: 19px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 18px 0 6px; }
    .hint { color: var(--muted); font-weight: 400; font-size: 12px; }
    input[type=text] {
      width: 100%; padding: 11px 12px; background: #1b1b20; color: var(--text);
      border: 1px solid var(--border); border-radius: 9px; font-size: 14px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    button {
      border: none; border-radius: 9px; padding: 11px 16px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-secondary { background: #34343e; color: var(--text); white-space: nowrap; }
    .btn-secondary:hover { background: #41414d; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 26px; }
    .btn-primary:hover { background: var(--accent-hover); }
    .status { margin-top: 16px; font-size: 13px; min-height: 18px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    .meta { margin-top: 22px; font-size: 11px; color: var(--muted); word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Obsidian Local MCP 설정</h1>
    <div class="sub">Claude가 읽고 쓸 Obsidian Vault 위치와 기본 작성자를 지정합니다.</div>

    <label>Vault 폴더 경로</label>
    <div class="row">
      <input type="text" id="vaultPath" placeholder="/Users/me/Documents/MyVault" />
      <button class="btn-secondary" id="pickBtn">폴더 선택…</button>
    </div>
    <div class="hint" style="margin-top:6px">‘폴더 선택’은 macOS 폴더 다이얼로그를 엽니다. 직접 입력도 가능합니다.</div>

    <label>기본 author <span class="hint">(새 노트의 author 미지정 시 사용)</span></label>
    <input type="text" id="defaultAuthor" placeholder="예: 홍길동" />

    <button class="btn-primary" id="saveBtn">저장</button>
    <div class="status" id="status"></div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const status = $("status");

    function setStatus(msg, kind) {
      status.textContent = msg;
      status.className = "status" + (kind ? " " + kind : "");
    }

    async function loadConfig() {
      const r = await fetch("/api/config");
      const c = await r.json();
      $("vaultPath").value = c.vaultPath || "";
      $("defaultAuthor").value = c.defaultAuthor || "";
      $("meta").textContent = "config: " + c.configPath;
    }

    $("pickBtn").addEventListener("click", async () => {
      setStatus("폴더 선택 창을 여는 중…");
      try {
        const r = await fetch("/api/pick-folder", { method: "POST" });
        const d = await r.json();
        if (d.error) return setStatus(d.error, "err");
        if (d.path) { $("vaultPath").value = d.path; setStatus("폴더를 선택했습니다.", "ok"); }
        else setStatus("선택이 취소되었습니다.");
      } catch (e) { setStatus(String(e), "err"); }
    });

    $("saveBtn").addEventListener("click", async () => {
      setStatus("저장 중…");
      try {
        const r = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            vaultPath: $("vaultPath").value.trim(),
            defaultAuthor: $("defaultAuthor").value,
          }),
        });
        const d = await r.json();
        if (!r.ok || d.error) return setStatus(d.error || "저장 실패", "err");
        setStatus("저장되었습니다. 실행 중인 MCP 서버에 다음 호출부터 반영됩니다.", "ok");
      } catch (e) { setStatus(String(e), "err"); }
    });

    loadConfig();
  </script>
</body>
</html>
